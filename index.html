<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi Như Ý</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #overlay-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 80%;
            pointer-events: none;
        }

        /* Hiệu ứng đếm số và tâm thư */
        #message {
            color: #ADD8E6; /* Xanh nhạt */
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px #ADD8E6, 0 0 20px #fff;
            line-height: 1.6;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

    <canvas id="ledCanvas"></canvas>
    <div id="overlay-container">
        <div id="message"></div>
    </div>

    <script>
        const canvas = document.getElementById('ledCanvas');
        const ctx = canvas.getContext('2d');
        const messageEl = document.getElementById('message');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const textMatrix = "Yêu Như Ý";
        const fontSize = 20;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        let runMatrix = true;

        // 1. Hiệu ứng Matrix LED Xanh nhạt & Trắng
        function drawMatrix() {
            if (!runMatrix) return;

            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                // Đổi màu: xanh nhạt hoặc trắng có phát sáng
                const color = Math.random() > 0.5 ? "#ADD8E6" : "#FFFFFF";
                ctx.fillStyle = color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = color;

                const char = textMatrix[Math.floor(Math.random() * textMatrix.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(drawMatrix);
        }

        // 2. Hàm tạo hiệu ứng đánh chữ từng ký tự
        async function typeWriter(text) {
            messageEl.innerHTML = "";
            for (let char of text) {
                messageEl.innerHTML += char;
                // Tốc độ đánh chữ: 80ms mỗi chữ
                await new Promise(r => setTimeout(r, 80));
            }
        }

        // 3. Kịch bản chính (Main Timeline)
        async function startLoveStory() {
            drawMatrix();

            // Chờ 2 giây đầu
            await new Promise(r => setTimeout(r, 2000));

            // Hiện số 1 -> đợi 1s -> số 2 -> đợi 1s -> số 3
            messageEl.innerText = "1";
            await new Promise(r => setTimeout(r, 1000));
            messageEl.innerText = "2";
            await new Promise(r => setTimeout(r, 1000));
            messageEl.innerText = "3";
            await new Promise(r => setTimeout(r, 1000));

            // Màn hình dần đen thui (Dừng matrix và xóa canvas)
            runMatrix = false;
            messageEl.innerText = "";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            await new Promise(r => setTimeout(r, 1000)); // Đợi một chút trong bóng tối

            // Hiện ra từng chữ cái dãy tâm thư
            const longText = "Helo Như Ý của ainhu, ainhu yeu như ý lm, cx mong sau này cs thể cùng vs như ý vượt qua hết tất cả cung bậc cảm xúc như buồn vui hạnh phúc, sau tất cả..ta lại về với nhau nhá cdang💞💗";

            messageEl.style.fontSize = "1.8rem"; // Chỉnh cỡ chữ nhỏ lại cho vừa đoạn văn
            await typeWriter(longText);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        startLoveStory();
    </script>
</body>
</html>
