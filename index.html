<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi Như Ý - Hoàn Hảo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }

        /* Màn hình 1 */
        #start-screen {
            position: fixed; inset: 0; z-index: 100;
            background: linear-gradient(180deg, #e0f7fa 0%, #ffffff 100%);
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s;
        }

        #start-btn {
            padding: 20px 50px; font-size: 24px; font-weight: bold;
            cursor: pointer; background: #81d4fa; border: none; border-radius: 50px;
            color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s;
        }

        .finger { position: absolute; font-size: 45px; animation: point 0.5s infinite alternate; }
        @keyframes point { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Màn hình chính */
        #stage { position: fixed; inset: 0; display: none; }
        canvas { display: block; }

        /* Chữ to giữa màn hình */
        #big-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; font-weight: bold; text-align: center; display: none;
            color: #00e5ff;
            text-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff, 0 0 50px #006064;
            z-index: 10;
        }

        /* Tâm thư cuối */
        #letter-screen {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; background: black;
            padding: 50px; text-align: center;
        }

        #typing-text {
            color: #b2ebf2; font-size: 28px; line-height: 1.8; max-width: 900px;
            text-shadow: 0 0 8px #fff, 0 0 15px #b2ebf2; /* Viền trắng phát sáng */
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div style="position: relative;">
            <button id="start-btn">ấn vô đây nè</button>
            <div class="finger" style="top: -70px; left: 40%;">👇</div>
            <div class="finger" style="bottom: -70px; left: 40%;">👆</div>
            <div class="finger" style="left: -90px; top: 10%;">👉</div>
            <div class="finger" style="right: -90px; top: 10%;">👈</div>
        </div>
    </div>

    <div id="stage">
        <canvas id="canvas"></canvas>
        <div id="big-text"></div>
    </div>

    <div id="letter-screen">
        <div id="typing-text"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const bigText = document.getElementById('big-text');
        const letterScreen = document.getElementById('letter-screen');
        const typingText = document.getElementById('typing-text');

        let drops = [];
        let animationId;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const columns = Math.floor(canvas.width / 150);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops.push({
                    x: i * 150 + Math.random() * 50,
                    y: Math.random() * -canvas.height,
                    speed: 2 + Math.random() * 3
                });
            }
        }

        function drawRain() {
            // QUAN TRỌNG: Xóa màn hình bằng màu đen nhạt để tạo hiệu ứng đuôi chữ mà không bị chồng chữ
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = "bold 22px Arial";
            drops.forEach(drop => {
                // Nhấp nháy màu
                ctx.fillStyle = Math.random() > 0.5 ? "#b2ebf2" : "#ffffff";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#b2ebf2";

                ctx.fillText("Yeu Như Ý", drop.x, drop.y);
                drop.y += drop.speed;
                if (drop.y > canvas.height) drop.y = -50;
            });
            animationId = requestAnimationFrame(drawRain);
        }

        document.getElementById('start-btn').onclick = function() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('stage').style.display = 'block';
                init();
                drawRain();

                // Kịch bản thời gian
                setTimeout(showBigWords, 2000);
            }, 1000);
        };

        function showBigWords() {
            bigText.style.display = 'block';

            // Yeu
            bigText.innerHTML = "Yeu";

            setTimeout(() => {
                // Như
                bigText.innerHTML = "Như";

                setTimeout(() => {
                    // Ý <3
                    bigText.innerHTML = "Ý <3";

                    setTimeout(() => {
                        // Bom khổng lồ chiếm màn hình
                        bigText.innerHTML = "💣";
                        bigText.style.fontSize = "900px";

                        setTimeout(() => {
                            // Kết thúc, sang tâm thư
                            cancelAnimationFrame(animationId);
                            document.getElementById('stage').style.display = 'none';
                            letterScreen.style.display = 'flex';
                            startTyping();
                        }, 2000);
                    }, 1000);
                }, 1000);
            }, 1000);
        }

        function startTyping() {
            const content = "Yeu nàng, cô gái đã một mình nghị lực, mạnh mẽ trải qua biết bao nhiêu thứ tồi tệ, toi thương nàng, thương luôn cả quá khứ không tốt của nàng, nàng của toi dth lm.. toi thích làm nàng cười. Toi chỉ mong mỗi lần nàng khog vui, nàng suy nghĩ nhiều thì nàng sẽ nhớ tới toi, vì tôi luôn ở đây với nàng, và.. cũng vì toi yeu nàng💞👉👈";
            let i = 0;
            function type() {
                if (i < content.length) {
                    typingText.innerHTML += content.charAt(i);
                    i++;
                    setTimeout(type, 70);
                }
            }
            type();
        }

        window.onresize = init;
    </script>
</body>
</html>
