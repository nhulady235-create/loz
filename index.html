<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Xì Dách</title>
</head>
<body style="background:#1a472a; color:white; text-align:center;">
    <h1>KIỂM TRA NÚT BẤM</h1>
    <div id="box" style="border:2px solid white; height:100px; margin:20px;"></div>

    <button onclick="startGame()" style="padding:10px 20px; cursor:pointer;">CHIA BÀI</button>

    <script>
        function startGame() {
            // Nếu nhấn được, nó sẽ hiện chữ và đổi màu ô vuông
            document.getElementById('box').innerHTML = "<h2>THÀNH CÔNG!</h2><p>Mã đã chạy.</p>";
            document.getElementById('box').style.background = "white";
            document.getElementById('box').style.color = "black";
            console.log("Nút đã hoạt động!");
        }
    </script>
</body>
</html>
