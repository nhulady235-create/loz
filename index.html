<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Fireworks Show</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial'; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
        }
        #bar-container { width: 250px; height: 4px; background: #333; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: white; transition: width 2s linear; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h2 id="status">Loading...</h2>
        <div id="bar-container"><div id="bar"></div></div>
    </div>

    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const bar = document.getElementById('bar');
const loadingScreen = document.getElementById('loading-screen');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CẤU HÌNH ---
const colors = ['#ff0040', '#ff00ff', '#00ffbf', '#00bfff', '#ffbf00', '#ff4000', '#ffffff'];
let particles = [];
let fireworkTimer = 0;
let currentWordIndex = 0;
const words = ["F", "U", "C", "K", "☺"];
let showStarted = false;

// Loading logic
setTimeout(() => bar.style.width = '100%', 100);
setTimeout(() => {
    loadingScreen.style.opacity = '0';
    setTimeout(() => {
        loadingScreen.style.display = 'none';
        showStarted = true;
    }, 500);
}, 2200);

class Particle {
    constructor(x, y, color, speed, angle, friction, gravity, char = null) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.char = char;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.015;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.friction = friction;
        this.gravity = gravity;
    }

    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;

        if (this.char) {
            ctx.font = "bold 80px Arial"; // Chữ nổ to ở giữa
            ctx.textAlign = "center";
            ctx.fillText(this.char, this.x, this.y);
        } else {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
    }
}

function createFirework(x, y, isText = false) {
    const particleCount = isText ? 40 : 120; // Pháo hoa thật nổ nhiều hạt hơn
    const color = isText ? "#FF69B4" : colors[Math.floor(Math.random() * colors.length)];
    const char = isText ? words[currentWordIndex] : null;

    for (let i = 0; i < particleCount; i++) {
        const angle = (Math.PI * 2 / particleCount) * i;
        const speed = isText ? Math.random() * 2 + 1 : Math.random() * 8 + 4;
        particles.push(new Particle(
            x, y, color, speed, angle,
            0.96, 0.07,
            (isText && i === 0) ? char : null // Chỉ 1 hạt mang chữ cái
        ));
    }
    if (isText) currentWordIndex++;
}

function animate() {
    // Tạo hiệu ứng đuôi mờ cho pháo hoa
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (showStarted) {
        fireworkTimer++;

        // Cứ mỗi 60 khung hình bắn 1 pháo hoa chữ hoặc pháo hoa sặc sỡ
        if (fireworkTimer % 70 === 0) {
            if (currentWordIndex < words.length) {
                // Nổ chữ ở giữa
                createFirework(canvas.width / 2, canvas.height * 0.4, true);
            }
        }

        // Bắn pháo hoa sặc sỡ ngẫu nhiên xung quanh
        if (Math.random() < 0.05) {
            createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.6, false);
        }
    }

    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.alpha <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
