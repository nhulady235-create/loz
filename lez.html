<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi chút năng lượng</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff0f5; /* Màu hồng nhạt cho ấm áp */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #container {
            text-align: center;
            position: relative;
        }

        /* Bàn tay được làm bự ra (150px) */
        .hand {
            font-size: 150px;
            cursor: pointer;
            display: inline-block;
        }

        /* Hiệu ứng đập đập 2 cái */
        .knock {
            animation: knockAnim 0.8s ease-in-out 2;
        }

        @keyframes knockAnim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) translateY(-30px); }
        }

        .pill-icon {
            font-size: 80px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
            filter: drop-shadow(2px 4px 10px rgba(0,0,0,0.1));
        }

        /* Giường to hơn */
        .bed-icon {
            font-size: 180px;
            display: none;
        }

        /* Bàn tay vỗ giường bự và nhẹ nhàng */
        .pat-hand {
            font-size: 100px;
            display: none;
            position: absolute;
            top: -40px;
            right: -50px;
            animation: patAnim 1.2s infinite;
        }

        @keyframes patAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(30px) rotate(-15deg); }
        }

        #message {
            margin-top: 30px;
            font-size: 32px;
            color: #4a4a4a;
            font-weight: bold;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="hand-main" class="hand knock">🖐️</div>
    <div id="pill" class="pill-icon" onclick="takeMedicine()">💊</div>
    <div id="bed-container" style="position: relative; display: inline-block;">
        <div id="bed" class="bed-icon">🛏️</div>
        <div id="pat-hand" class="pat-hand">🖐️</div>
    </div>
    <div id="message"></div>
</div>

<script>
    const handMain = document.getElementById('hand-main');
    const pill = document.getElementById('pill');
    const message = document.getElementById('message');
    const bed = document.getElementById('bed');
    const patHand = document.getElementById('pat-hand');

    // Sau khi đập tay xong (1.6s) thì hiện chữ và thuốc
    setTimeout(() => {
        handMain.classList.remove('knock');
        message.innerText = "nè";
        pill.style.display = "block";

        // Chờ 1.5 giây
        setTimeout(() => {
            message.innerText = "chj ms chế đó";

            // Chờ tiếp 1.5 giây
            setTimeout(() => {
                message.innerText = "uống thử đi";
            }, 1500);

        }, 1500);
    }, 1600);

    function takeMedicine() {
        // Ẩn thuốc và bàn tay xòe ban đầu
        pill.style.display = "none";
        handMain.style.display = "none";

        // Hiện câu nói uống rồi nghỉ đi
        message.innerText = "uống r thì nghỉ đi";

        // Hiện giường và bàn tay vỗ nhẹ kèm câu chốt
        setTimeout(() => {
            bed.style.display = "block";

            message.innerText = "lại đây chj ôm e ngủ babi";
        }, 1000);
    }
</script>

</body>
</html>
